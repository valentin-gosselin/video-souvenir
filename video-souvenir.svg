<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B6B"/>
      <stop offset="0.55" stop-color="#FF8C42"/>
      <stop offset="1" stop-color="#7E2C8E"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi sunset -->
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg)"/>

  <!-- Pellicule -->
  <g filter="url(#soft)">
    <rect x="72" y="52" width="112" height="172" rx="10" fill="#1a1a1a"/>
  </g>

  <!-- Perforations -->
  <g fill="#fafafa">
    <rect x="84" y="66" width="14" height="9" rx="2"/>
    <rect x="158" y="66" width="14" height="9" rx="2"/>
    <rect x="84" y="201" width="14" height="9" rx="2"/>
    <rect x="158" y="201" width="14" height="9" rx="2"/>
  </g>

  <!-- 3 photogrammes : couleurs de souvenirs (soleil / nature / mer) -->
  <rect x="90" y="84" width="76" height="38" rx="3" fill="#FFD166"/>
  <rect x="90" y="126" width="76" height="38" rx="3" fill="#06D6A0"/>
  <rect x="90" y="168" width="76" height="38" rx="3" fill="#118AB2"/>

  <!-- Petites ombres entre photogrammes pour la separation -->
  <g fill="#000" opacity="0.15">
    <rect x="90" y="122" width="76" height="4"/>
    <rect x="90" y="164" width="76" height="4"/>
  </g>

  <!-- Bulle "souvenir" : coeur dans cercle blanc, coin sup droit -->
  <g filter="url(#soft)">
    <circle cx="194" cy="62" r="26" fill="#ffffff"/>
  </g>
  <path d="M194 76
           C 184 68 178 60 178 53
           C 178 47 184 45 188 49
           C 190 51 192 53 194 56
           C 196 53 198 51 200 49
           C 204 45 210 47 210 53
           C 210 60 204 68 194 76 Z"
        fill="#FF3366"/>
</svg>
